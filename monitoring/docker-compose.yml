services:

  # ── 1. Prometheus Exporter — scrapes live temperature from Sepolia ──
  exporter:
    build:
      context: .
      dockerfile: Dockerfile.exporter
    container_name: coldchain_exporter
    ports:
      - "9000:9000"
    restart: unless-stopped

  # ── 2. Prometheus — collects metrics from the exporter ──
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: coldchain_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - exporter
    restart: unless-stopped

  # ── 3. Grafana — dashboards + alerting rules ──
  grafana:
    image: grafana/grafana:10.4.2
    container_name: coldchain_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── 4. Frontend — React app served via Nginx ──
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: coldchain_frontend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
