global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrapes the Node.js exporter that reads from the Sepolia blockchain
  - job_name: 'coldchain_exporter'
    scrape_interval: 10s
    static_configs:
      - targets: ['exporter:9000']
        labels:
          service: 'vaccine-shipment'
